name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit and integration tests
        run: |
          pytest tests/test_classifier.py tests/test_api.py -v
        # Note: tests/eval_classifier.py is excluded from CI since it requires
        # a live Ollama instance with a pulled model. It's run manually/locally
        # to produce the accuracy metrics reported in the Design & Testing doc.
